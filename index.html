<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>لمبة المدخل (تجربة)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
  :root{
    --night:#0b1220; --night-2:#121b30; --porch:#f5a623; --porch-soft:#ffd98a;
    --slate:#3a4150; --text:#e8e6e1; --text-dim:#8791a3; --danger:#d97757;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    font-family:'IBM Plex Sans Arabic', system-ui, sans-serif;
    background: radial-gradient(ellipse at 50% 20%, var(--night-2), var(--night) 70%);
    color:var(--text); display:flex; align-items:center; justify-content:center;
    min-height:100vh; transition: background 1.2s ease;
  }
  body.lamp-on{ background: radial-gradient(ellipse at 50% 15%, #2a2412 0%, var(--night) 65%); }
  .status-bar{ position:fixed; top:20px; right:24px; font-size:13px; color:var(--text-dim);
    display:flex; align-items:center; gap:8px; }
  .dot{ width:8px;height:8px;border-radius:50%; background:var(--slate); transition: all .3s; }
  .dot.online{ background:#6fcf97; box-shadow:0 0 8px #6fcf9788; }
  .dot.offline{ background:var(--danger); }
  .card{ text-align:center; padding:56px 48px 44px; }
  .eyebrow{ font-size:13px; letter-spacing:0.18em; color:var(--text-dim); margin-bottom:6px; text-transform:uppercase; }
  h1{ font-family:'Space Grotesk', sans-serif; font-size:26px; margin:0 0 6px; font-weight:700; }
  .sub{ font-size:13px; color:var(--text-dim); margin-bottom:42px; }
  .lamp-shell{ position:relative; width:180px; height:180px; margin:0 auto 36px; }
  .glow{ position:absolute; inset:-40px; border-radius:50%;
    background: radial-gradient(circle, var(--porch-soft) 0%, transparent 70%);
    opacity:0; transition: opacity .5s ease; filter: blur(2px); }
  .glow.on{ opacity:0.55; }
  .switch-btn{ position:relative; width:180px; height:180px; border-radius:50%;
    border:2px solid var(--slate); background: linear-gradient(180deg, #1a2338, #0e1526);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition: border-color .4s, background .4s, transform .15s;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.4); }
  .switch-btn:active{ transform: scale(0.97); }
  .switch-btn.on{ border-color: var(--porch);
    background: radial-gradient(circle at 50% 40%, #4a3618, #24200f);
    box-shadow: 0 0 40px 8px rgba(245,166,35,0.35), inset 0 0 20px rgba(255,217,138,0.2); }
  .switch-btn:disabled{ cursor:wait; opacity:0.6; }
  .bulb-icon{ width:56px;height:56px; stroke: var(--text-dim); fill:none; stroke-width:1.6; transition: stroke .4s; }
  .switch-btn.on .bulb-icon{ stroke: var(--porch-soft); }
  .state-label{ font-family:'Space Grotesk', sans-serif; font-size:22px; font-weight:700;
    margin-top:4px; color:var(--slate); transition: color .4s; }
  .state-label.on{ color: var(--porch); }
  .meta{ margin-top:18px; font-size:12px; color:var(--text-dim); min-height:16px; }
</style>
</head>
<body>
  <div class="status-bar">
    <span class="dot" id="connDot"></span>
    <span id="connText">بيتصل...</span>
  </div>

  <div class="card">
    <div class="eyebrow">Simulation Mode</div>
    <h1>لمبة المدخل</h1>
    <div class="sub">متصل بـ Wokwi عن طريق public test broker</div>

    <div class="lamp-shell">
      <div class="glow" id="glow"></div>
      <button class="switch-btn" id="switchBtn" disabled>
        <svg class="bulb-icon" viewBox="0 0 24 24">
          <path d="M9 18h6M10 21h4M12 3a6 6 0 0 0-3.6 10.8c.5.4.8 1 .8 1.7V16h5.6v-.5c0-.7.3-1.3.8-1.7A6 6 0 0 0 12 3z"/>
        </svg>
      </button>
    </div>

    <div class="state-label" id="stateLabel">—</div>
    <div class="meta" id="metaText"></div>
  </div>

<script>
  // ---- must match UNIQUE_ID in the Wokwi sketch ----
  const UNIQUE_ID = "ahmed-lamp-7391";
  // ---------------------------------------------------

  const MQTT_HOST = "broker.hivemq.com";
  const MQTT_PORT = 8884; // public broker's SECURE websocket port (wss, no auth)

  const TOPIC_SET    = `home/${UNIQUE_ID}/set`;
  const TOPIC_STATUS = `home/${UNIQUE_ID}/status`;

  const btn = document.getElementById('switchBtn');
  const glow = document.getElementById('glow');
  const label = document.getElementById('stateLabel');
  const meta = document.getElementById('metaText');
  const connDot = document.getElementById('connDot');
  const connText = document.getElementById('connText');

  let currentState = null;
  let pending = false;

  function render(on) {
    document.body.classList.toggle('lamp-on', on);
    btn.classList.toggle('on', on);
    glow.classList.toggle('on', on);
    label.classList.toggle('on', on);
    label.textContent = on ? 'اللمبة شغالة' : 'اللمبة مقفولة';
  }

  const client = mqtt.connect(`wss://${MQTT_HOST}:${MQTT_PORT}/mqtt`, {
    clientId: 'web-' + UNIQUE_ID + '-' + Math.random().toString(16).slice(2),
    reconnectPeriod: 3000,
  });

  client.on('connect', () => {
    connDot.className = 'dot online';
    connText.textContent = 'متصل';
    client.subscribe(TOPIC_STATUS);
  });
  client.on('reconnect', () => {
    connDot.className = 'dot';
    connText.textContent = 'بيحاول يتصل تاني...';
    btn.disabled = true;
  });
  client.on('close', () => {
    connDot.className = 'dot offline';
    connText.textContent = 'مقطوع الاتصال';
    btn.disabled = true;
  });
  client.on('message', (topic, payload) => {
    if (topic === TOPIC_STATUS) {
      currentState = (payload.toString() === 'ON');
      render(currentState);
      pending = false;
      btn.disabled = false;
      meta.textContent = 'آخر تحديث: ' + new Date().toLocaleTimeString('ar-EG');
    }
  });

  btn.addEventListener('click', () => {
    if (pending || currentState === null) return;
    pending = true;
    btn.disabled = true;
    const next = !currentState;
    client.publish(TOPIC_SET, next ? 'ON' : 'OFF');
    meta.textContent = 'بيبعت الأمر...';
    setTimeout(() => { if (pending) { pending = false; btn.disabled = false; } }, 4000);
  });
</script>
</body>
</html>
